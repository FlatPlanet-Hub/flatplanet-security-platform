name: Build, Test & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --no-restore

      - name: Publish
        if: github.ref == 'refs/heads/main'
        run: dotnet publish src/FlatPlanet.Security.API/FlatPlanet.Security.API.csproj --configuration Release --runtime linux-x64 --self-contained false --output ./publish

      - name: Deploy to Azure App Service
        if: github.ref == 'refs/heads/main'
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          RAW_USER=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
          # URL-encode $ in username (%24) for basic auth
          USERNAME=$(echo "$RAW_USER" | sed 's/\$/%24/g')
          cd ./publish && zip -r ../app.zip . && cd ..
          HTTP_STATUS=$(curl -s -o response.txt -w "%{http_code}" -X POST \
            "https://flatplanet-security-api-d5cgdyhmgxcebyak.scm.southeastasia-01.azurewebsites.net/api/zipdeploy" \
            -u "$USERNAME:$PASSWORD" \
            --data-binary @app.zip)
          echo "Deploy response: $HTTP_STATUS"
          cat response.txt || true
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Deployment failed with HTTP $HTTP_STATUS"
            exit 1
          fi
